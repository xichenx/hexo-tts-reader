# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Sync package.json version with release tag
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.+-]+)?(\+[0-9A-Za-z.+-]+)?$ ]]; then
            echo "::error::Release tag '$TAG_NAME' is not a valid semver (expected e.g. v1.2.3 or 1.2.3-beta.1)."
            exit 1
          fi
          CURRENT="$(node -p "require('./package.json').version")"
          echo "Release tag:               $TAG_NAME"
          echo "Resolved version:          $VERSION"
          echo "package.json before sync:  $CURRENT"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "package.json after sync:   $(node -p "require('./package.json').version")"

      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.npm_token}}
